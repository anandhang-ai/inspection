version: "3.9"

services:
  # ─── MySQL Database ───
  db:
    image: mysql:8.0
    container_name: inspection-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-inspection_db}
      MYSQL_USER: ${DB_USER:-inspection_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-inspection_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - inspection-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Node.js Backend ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inspection-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      DB_HOST: db
      DB_USER: ${DB_USER:-inspection_user}
      DB_PASSWORD: ${DB_PASSWORD:-inspection_pass}
      DB_DATABASE: ${DB_DATABASE:-inspection_db}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production}
    ports:
      - "5000:5000"
    networks:
      - inspection-net

  # ─── React Frontend (Nginx) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inspection-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - inspection-net

volumes:
  mysql_data:
    driver: local

networks:
  inspection-net:
    driver: bridge
